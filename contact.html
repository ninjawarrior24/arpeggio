<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arpeggio — Contact</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner container">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="images/arpeggiologo.png" alt="Arpeggio logo">
          <span class="brand-heading">Arpeggio Resources</span>
        </a>
        <nav class="site-nav">
          <a href="index.html">Home</a>
          <a href="team.html">Team</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <h1>Let's Work Together</h1>
        <div class="card">
          <p class="muted">Ready to take your business to the next level? Get in touch with us today to discover how Arpeggio Resources, LLC can help you achieve your goals.</p>

          <form action="mailto:arpeggio8888@gmail.com" method="post" enctype="text/plain" style="margin-top:14px;display:grid;gap:12px;max-width:720px">
            <input type="hidden" name="subject" value="Website contact form">
            <div class="form-group">
              <label for="fname">First name</label>
              <input id="fname" name="fname" required />
            </div>
            <div class="form-group">
              <label for="lname">Last name</label>
              <input id="lname" name="lname" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button class="submit-button" type="submit">Send</button>
          </form>

         
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div>Arpeggio Resources, LLC — Transforming Immersive Technology into Business Success</div>
      </div>
    </footer>
  </body>
</html>
